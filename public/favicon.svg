<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#F5A23B"/>
      <stop offset="100%" stop-color="#E56A2B"/>
    </linearGradient>
    <linearGradient id="racketHead" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#C85A20"/>
      <stop offset="50%" stop-color="#943015"/>
      <stop offset="100%" stop-color="#6B2010"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#F5A030"/>
      <stop offset="100%" stop-color="#D45A20"/>
    </radialGradient>
  </defs>

  <!-- Shield border (dark brown) -->
  <path d="M6 10a8 8 0 018-8h36a8 8 0 018 8v20c0 12-16 22-26 28C22 44 6 34 6 22V10z" fill="#7A2D10"/>

  <!-- Shield fill (orange gradient) -->
  <path d="M8 11a7 7 0 017-7h34a7 7 0 017 7v19c0 11-14.5 20-24 26C23 43 8 33 8 22V11z" fill="url(#shieldFill)"/>

  <!-- Court net grid (upper-left background) -->
  <g opacity="0.3" stroke="#D48030" stroke-width="0.7">
    <line x1="12" y1="10" x2="12" y2="28"/>
    <line x1="16.5" y1="10" x2="16.5" y2="30"/>
    <line x1="21" y1="8" x2="21" y2="32"/>
    <line x1="25.5" y1="8" x2="25.5" y2="32"/>
    <line x1="10" y1="13" x2="28" y2="13"/>
    <line x1="10" y1="17.5" x2="28" y2="17.5"/>
    <line x1="10" y1="22" x2="27" y2="22"/>
    <line x1="10" y1="26.5" x2="25" y2="26.5"/>
  </g>

  <!-- Court floor lines -->
  <g opacity="0.2" stroke="white" stroke-width="0.8">
    <line x1="14" y1="40" x2="50" y2="40"/>
    <line x1="20" y1="44" x2="46" y2="44"/>
    <line x1="32" y1="36" x2="32" y2="50"/>
  </g>

  <!-- Padel racket tilted ~35deg from bottom-left to upper-right -->
  <g transform="translate(33,30) rotate(-35)">
    <!-- Racket head -->
    <ellipse cx="0" cy="-9" rx="12" ry="14" fill="url(#racketHead)" stroke="#5A1A08" stroke-width="2"/>
    <!-- Racket head inner shine -->
    <ellipse cx="-2" cy="-12" rx="6" ry="8" fill="white" opacity="0.06"/>

    <!-- Holes pattern - 5 rows -->
    <!-- Row 1 (top) -->
    <circle cx="-5" cy="-17" r="1.1" fill="white" opacity="0.85"/>
    <circle cx="0" cy="-17" r="1.1" fill="white" opacity="0.85"/>
    <circle cx="5" cy="-17" r="1.1" fill="white" opacity="0.85"/>
    <!-- Row 2 -->
    <circle cx="-7.5" cy="-13" r="1.1" fill="white" opacity="0.85"/>
    <circle cx="-3.5" cy="-13" r="1.1" fill="white" opacity="0.85"/>
    <circle cx="0.5" cy="-13" r="1.1" fill="white" opacity="0.85"/>
    <circle cx="4.5" cy="-13" r="1.1" fill="white" opacity="0.85"/>
    <circle cx="8" cy="-13" r="1.1" fill="white" opacity="0.8"/>
    <!-- Row 3 -->
    <circle cx="-8" cy="-9" r="1.1" fill="white" opacity="0.8"/>
    <circle cx="-4" cy="-9" r="1.1" fill="white" opacity="0.8"/>
    <circle cx="0" cy="-9" r="1.1" fill="white" opacity="0.8"/>
    <circle cx="4" cy="-9" r="1.1" fill="white" opacity="0.8"/>
    <circle cx="8" cy="-9" r="1.1" fill="white" opacity="0.8"/>
    <!-- Row 4 -->
    <circle cx="-7" cy="-5" r="1.1" fill="white" opacity="0.75"/>
    <circle cx="-3" cy="-5" r="1.1" fill="white" opacity="0.75"/>
    <circle cx="1" cy="-5" r="1.1" fill="white" opacity="0.75"/>
    <circle cx="5" cy="-5" r="1.1" fill="white" opacity="0.75"/>
    <circle cx="8" cy="-5" r="1.1" fill="white" opacity="0.7"/>
    <!-- Row 5 (bottom) -->
    <circle cx="-5" cy="-1" r="1.1" fill="white" opacity="0.65"/>
    <circle cx="0" cy="-1" r="1.1" fill="white" opacity="0.65"/>
    <circle cx="5" cy="-1" r="1.1" fill="white" opacity="0.65"/>

    <!-- Handle -->
    <rect x="-3.5" y="5" width="7" height="15" rx="2.5" fill="#C0B8B0"/>
    <rect x="-3" y="5.5" width="6" height="14" rx="2" fill="#D0C8C0"/>
    <!-- Handle grip cross wraps -->
    <line x1="-2.5" y1="9" x2="2.5" y2="11.5" stroke="#A09080" stroke-width="0.8"/>
    <line x1="-2.5" y1="12.5" x2="2.5" y2="15" stroke="#A09080" stroke-width="0.8"/>
    <line x1="-2.5" y1="16" x2="2.5" y2="18.5" stroke="#A09080" stroke-width="0.8"/>
  </g>

  <!-- Ball (orange, upper-right of racket) -->
  <circle cx="44" cy="13" r="7" fill="url(#ballGrad)" stroke="#A04515" stroke-width="1.2"/>
  <!-- Ball seam lines -->
  <path d="M40 10.5c2.5 1.5 3.2 4.5 1.5 6.5" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M46 10c-1.2 2.2-0.8 4.5 1 6" stroke="white" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.55"/>
  <!-- Ball shine -->
  <ellipse cx="42.5" cy="11" rx="2" ry="1.2" fill="white" opacity="0.2" transform="rotate(-20 42.5 11)"/>

  <!-- Shield highlight (glossy top-left) -->
  <path d="M10 11a5 5 0 015-5h10c-4 8-6 16-6 24-4-4-7-9-8.5-14L10 11z" fill="white" opacity="0.08"/>
</svg>
