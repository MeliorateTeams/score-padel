<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Shield outer border (bevel effect) -->
  <path d="M4 10C4 6.686 6.686 4 10 4h44c3.314 0 6 2.686 6 6v26c0 11-14 20-28 24C18 56 4 47 4 36V10z" fill="#F06A4D"/>
  <!-- Shield inner -->
  <path d="M6 11c0-2.761 2.239-5 5-5h42c2.761 0 5 2.239 5 5v25c0 10-13 18-26 22C19 54 6 45 6 35V11z" fill="#E5553B"/>
  <!-- Shield darker inner for depth -->
  <path d="M8 12c0-2.209 1.791-4 4-4h40c2.209 0 4 1.791 4 4v23c0 9-12 17-24 20C20 52 8 43 8 34V12z" fill="#D44030"/>

  <!-- Court/net behind racket -->
  <!-- Vertical net lines -->
  <line x1="16" y1="28" x2="16" y2="50" stroke="white" stroke-width="0.7" opacity="0.15"/>
  <line x1="22" y1="28" x2="22" y2="52" stroke="white" stroke-width="0.7" opacity="0.15"/>
  <line x1="28" y1="26" x2="28" y2="52" stroke="white" stroke-width="0.7" opacity="0.15"/>
  <!-- Horizontal net lines -->
  <line x1="10" y1="34" x2="34" y2="34" stroke="white" stroke-width="0.7" opacity="0.15"/>
  <line x1="10" y1="40" x2="30" y2="40" stroke="white" stroke-width="0.7" opacity="0.15"/>
  <line x1="10" y1="46" x2="26" y2="46" stroke="white" stroke-width="0.7" opacity="0.15"/>
  <!-- Net top line (thicker) -->
  <line x1="10" y1="28" x2="34" y2="28" stroke="white" stroke-width="1" opacity="0.25"/>

  <!-- Padel racket (tilted ~45 degrees like the reference) -->
  <g transform="translate(34,30) rotate(-40)">
    <!-- Racket head outline -->
    <ellipse cx="0" cy="-8" rx="11" ry="14" stroke="white" stroke-width="2.8" fill="#C03828" opacity="1"/>
    <!-- Holes pattern (like reference - dots grid) -->
    <circle cx="-5" cy="-14" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="0" cy="-14" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="5" cy="-14" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="-7" cy="-10" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="-2.5" cy="-10" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="2.5" cy="-10" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="7" cy="-10" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="-7" cy="-6" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="-2.5" cy="-6" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="2.5" cy="-6" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="7" cy="-6" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="-5" cy="-2" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="0" cy="-2" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="5" cy="-2" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="-3" cy="2" r="1.2" fill="white" opacity="0.7"/>
    <circle cx="3" cy="2" r="1.2" fill="white" opacity="0.7"/>
    <!-- Handle -->
    <rect x="-3" y="6" width="6" height="14" rx="3" fill="white"/>
    <!-- Handle grip lines -->
    <line x1="-1.5" y1="11" x2="1.5" y2="13" stroke="#D44030" stroke-width="0.8"/>
    <line x1="-1.5" y1="14" x2="1.5" y2="16" stroke="#D44030" stroke-width="0.8"/>
  </g>

  <!-- Ball (yellow-green like reference, on the racket) -->
  <circle cx="44" cy="12" r="6.5" fill="#C8E530"/>
  <circle cx="44" cy="12" r="6.5" fill="none" stroke="#A0B820" stroke-width="0.8"/>
  <!-- Ball seam curve -->
  <path d="M40.5 9c2.5 1.5 3 4.5 1 6.5" stroke="white" stroke-width="1.3" opacity="0.7" fill="none" stroke-linecap="round"/>

  <!-- Shield highlight (glossy effect like reference) -->
  <path d="M8 12c0-2.2 1.8-4 4-4h12c-3 10-5 20-5 28-5-3-8-7-10-11L8 12z" fill="white" opacity="0.07"/>
</svg>
