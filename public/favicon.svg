    <line x1="-1.5" y1="12" x2="1.5" y2="12" stroke="#E5553B" stroke-width="0.8"/>
    <line x1="-1.5" y1="14" x2="1.5" y2="14" stroke="#E5553B" stroke-width="0.8"/>
