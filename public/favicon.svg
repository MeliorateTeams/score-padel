<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0623A"/>
      <stop offset="100%" stop-color="#D44428"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Padel racket — centered, slight tilt -->
  <g transform="translate(32,34) rotate(-15)">
    <!-- Racket head (rounded rectangle typical of padel) -->
    <rect x="-11" y="-22" width="22" height="24" rx="11" fill="white" opacity="0.95"/>

    <!-- Holes — 4 rows, symmetrical -->
    <circle cx="-5.5" cy="-18" r="1.5" fill="#D44428"/>
    <circle cx="0"    cy="-18" r="1.5" fill="#D44428"/>
    <circle cx="5.5"  cy="-18" r="1.5" fill="#D44428"/>

    <circle cx="-7"   cy="-13" r="1.5" fill="#D44428"/>
    <circle cx="-2"   cy="-13" r="1.5" fill="#D44428"/>
    <circle cx="3"    cy="-13" r="1.5" fill="#D44428"/>
    <circle cx="7.5"  cy="-13" r="1.4" fill="#D44428"/>

    <circle cx="-7"   cy="-8"  r="1.5" fill="#D44428"/>
    <circle cx="-2"   cy="-8"  r="1.5" fill="#D44428"/>
    <circle cx="3"    cy="-8"  r="1.5" fill="#D44428"/>
    <circle cx="7.5"  cy="-8"  r="1.4" fill="#D44428"/>

    <circle cx="-5.5" cy="-3"  r="1.5" fill="#D44428"/>
    <circle cx="0"    cy="-3"  r="1.5" fill="#D44428"/>
    <circle cx="5.5"  cy="-3"  r="1.5" fill="#D44428"/>

    <!-- Neck / throat piece -->
    <rect x="-4.5" y="2" width="9" height="5" rx="1.5" fill="white" opacity="0.7"/>

    <!-- Handle -->
    <rect x="-4" y="7" width="8" height="16" rx="3" fill="white" opacity="0.85"/>
    <!-- Grip texture lines -->
    <line x1="-2.5" y1="10" x2="2.5" y2="12"  stroke="#F0623A" stroke-width="1" stroke-linecap="round"/>
    <line x1="-2.5" y1="13.5" x2="2.5" y2="15.5" stroke="#F0623A" stroke-width="1" stroke-linecap="round"/>
    <line x1="-2.5" y1="17"  x2="2.5" y2="19"  stroke="#F0623A" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Ball — top right -->
  <circle cx="48" cy="14" r="7.5" fill="white" opacity="0.92"/>
  <path d="M43.5 11c2 2 2.5 5 0.5 7.5" stroke="#F0623A" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M47 10.5c-1 2.5 -0.5 5 1.5 7" stroke="#F0623A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
