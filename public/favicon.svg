  <rect x="22" y="11" width="20" height="29" rx="10" stroke="white" stroke-width="4" fill="none"/>
  <!-- Grid lines vertical -->
  <line x1="27" y1="19" x2="27" y2="32" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="32" y1="19" x2="32" y2="32" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="37" y1="19" x2="37" y2="32" stroke="white" stroke-width="2" opacity="0.5"/>
  <!-- Grid lines horizontal -->
  <line x1="22" y1="23" x2="42" y2="23" stroke="white" stroke-width="2" opacity="0.5"/>
