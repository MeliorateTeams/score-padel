<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="50%" stop-color="#141425"/>
      <stop offset="100%" stop-color="#0F0F1A"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6A00"/>
      <stop offset="100%" stop-color="#E55C00"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6A00" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF6A00"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg3)"/>
  <!-- Grid lines -->
  <g opacity="0.06" stroke="white" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
  </g>
  <!-- Chart area glow -->
  <ellipse cx="500" cy="250" rx="300" ry="120" fill="#FF6A00" opacity="0.03"/>
  <!-- Bar chart -->
  <rect x="130" y="260" width="40" height="80" rx="4" fill="url(#barGrad)" opacity="0.3"/>
  <rect x="200" y="220" width="40" height="120" rx="4" fill="url(#barGrad)" opacity="0.4"/>
  <rect x="270" y="200" width="40" height="140" rx="4" fill="url(#barGrad)" opacity="0.5"/>
  <rect x="340" y="170" width="40" height="170" rx="4" fill="url(#barGrad)" opacity="0.6"/>
  <rect x="410" y="140" width="40" height="200" rx="4" fill="url(#barGrad)" opacity="0.7"/>
  <rect x="480" y="160" width="40" height="180" rx="4" fill="url(#barGrad)" opacity="0.65"/>
  <rect x="550" y="120" width="40" height="220" rx="4" fill="url(#barGrad)" opacity="0.8"/>
  <rect x="620" y="100" width="40" height="240" rx="4" fill="url(#barGrad)" opacity="0.9"/>
  <!-- Rising line chart overlay -->
  <path d="M150 290 C220 260 290 240 350 215 C410 190 450 175 490 185 C530 195 560 165 590 140 C620 115 640 100 660 90" stroke="url(#lineGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Data points -->
  <circle cx="150" cy="290" r="4" fill="#FF8C33" opacity="0.5"/>
  <circle cx="350" cy="215" r="4" fill="#FF8C33" opacity="0.7"/>
  <circle cx="490" cy="185" r="5" fill="#FF6A00" opacity="0.8"/>
  <circle cx="590" cy="140" r="5" fill="#FF6A00" opacity="0.9"/>
  <circle cx="660" cy="90" r="7" fill="#FF6A00"/>
  <circle cx="660" cy="90" r="12" fill="#FF6A00" opacity="0.2"/>
  <!-- Left panel: Player stats -->
  <rect x="40" y="40" width="200" height="160" rx="16" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.08"/>
  <text x="140" y="72" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" font-weight="600" opacity="0.8">Tu progreso</text>
  <line x1="60" y1="82" x2="220" y2="82" stroke="white" stroke-opacity="0.08"/>
  <!-- Stat rows -->
  <text x="70" y="108" fill="white" font-family="system-ui" font-size="11" opacity="0.5">Partidos</text>
  <text x="220" y="108" text-anchor="end" fill="#FF6A00" font-family="system-ui" font-size="13" font-weight="700">156</text>
  <text x="70" y="132" fill="white" font-family="system-ui" font-size="11" opacity="0.5">Victorias</text>
  <text x="220" y="132" text-anchor="end" fill="#FFB347" font-family="system-ui" font-size="13" font-weight="700">112</text>
  <text x="70" y="156" fill="white" font-family="system-ui" font-size="11" opacity="0.5">Valoración</text>
  <text x="220" y="156" text-anchor="end" fill="#FF6A00" font-family="system-ui" font-size="13" font-weight="700">5.2</text>
  <text x="70" y="180" fill="white" font-family="system-ui" font-size="11" opacity="0.5">Racha</text>
  <text x="220" y="180" text-anchor="end" fill="#FFB347" font-family="system-ui" font-size="13" font-weight="700">W5</text>
  <!-- Right side: big number -->
  <text x="700" y="70" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="600" opacity="0.4" letter-spacing="3">VALORACIÓN</text>
  <text x="700" y="60" text-anchor="middle" fill="white" font-family="system-ui" font-size="80" font-weight="800" opacity="0.06">5.2</text>
  <!-- Bottom label -->
  <text x="400" y="380" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" opacity="0.3">Evolución de tu rendimiento · Score Padel</text>
</svg>
