<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F0F1A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="racketGrad" x1="300" y1="60" x2="500" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6A00"/>
      <stop offset="100%" stop-color="#E55C00"/>
    </linearGradient>
    <radialGradient id="ballGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFB347" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFB347" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg2)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="120" fill="#FF6A00" opacity="0.04"/>
  <circle cx="150" cy="350" r="100" fill="#FF6A00" opacity="0.03"/>
  <!-- Racket shape (large, artistic) -->
  <g transform="translate(250, 30) rotate(15, 150, 180)">
    <!-- Handle -->
    <rect x="135" y="270" width="30" height="100" rx="15" fill="url(#racketGrad)"/>
    <!-- Grip lines -->
    <line x1="140" y1="290" x2="160" y2="290" stroke="white" stroke-width="1" opacity="0.25"/>
    <line x1="140" y1="305" x2="160" y2="305" stroke="white" stroke-width="1" opacity="0.25"/>
    <line x1="140" y1="320" x2="160" y2="320" stroke="white" stroke-width="1" opacity="0.25"/>
    <line x1="140" y1="335" x2="160" y2="335" stroke="white" stroke-width="1" opacity="0.25"/>
    <!-- Head -->
    <ellipse cx="150" cy="150" rx="100" ry="130" fill="url(#racketGrad)" opacity="0.9"/>
    <ellipse cx="150" cy="150" rx="90" ry="120" fill="#1A1A2E"/>
    <!-- Grid holes -->
    <circle cx="120" cy="80" r="12" fill="#FF6A00" opacity="0.15"/>
    <circle cx="150" cy="75" r="12" fill="#FF6A00" opacity="0.15"/>
    <circle cx="180" cy="80" r="12" fill="#FF6A00" opacity="0.15"/>
    <circle cx="110" cy="110" r="12" fill="#FF6A00" opacity="0.12"/>
    <circle cx="140" cy="108" r="12" fill="#FF6A00" opacity="0.12"/>
    <circle cx="170" cy="108" r="12" fill="#FF6A00" opacity="0.12"/>
    <circle cx="200" cy="110" r="12" fill="#FF6A00" opacity="0.12"/>
    <circle cx="105" cy="145" r="12" fill="#FF6A00" opacity="0.10"/>
    <circle cx="135" cy="142" r="12" fill="#FF6A00" opacity="0.10"/>
    <circle cx="165" cy="142" r="12" fill="#FF6A00" opacity="0.10"/>
    <circle cx="195" cy="145" r="12" fill="#FF6A00" opacity="0.10"/>
    <circle cx="110" cy="178" r="12" fill="#FF6A00" opacity="0.08"/>
    <circle cx="140" cy="175" r="12" fill="#FF6A00" opacity="0.08"/>
    <circle cx="170" cy="175" r="12" fill="#FF6A00" opacity="0.08"/>
    <circle cx="200" cy="178" r="12" fill="#FF6A00" opacity="0.08"/>
    <circle cx="120" cy="210" r="12" fill="#FF6A00" opacity="0.06"/>
    <circle cx="150" cy="208" r="12" fill="#FF6A00" opacity="0.06"/>
    <circle cx="180" cy="210" r="12" fill="#FF6A00" opacity="0.06"/>
    <!-- Frame highlight -->
    <ellipse cx="150" cy="150" rx="100" ry="130" fill="none" stroke="#FFB347" stroke-width="3" opacity="0.4"/>
  </g>
  <!-- Ball with glow -->
  <circle cx="580" cy="130" r="50" fill="url(#ballGlow)"/>
  <circle cx="580" cy="130" r="22" fill="#FFB347"/>
  <path d="M562 120 Q580 145 598 120" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M565 140 Q580 115 595 140" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Text elements -->
  <text x="560" y="210" text-anchor="middle" fill="white" font-family="system-ui" font-size="28" font-weight="800" opacity="0.9">PÁDEL</text>
  <text x="560" y="238" text-anchor="middle" fill="#FF6A00" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="4">SCORE PADEL</text>
  <text x="560" y="265" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" opacity="0.4">Tu valoración global</text>
  <!-- Rating badge -->
  <rect x="510" y="280" width="100" height="40" rx="20" fill="#FF6A00" opacity="0.15"/>
  <text x="560" y="306" text-anchor="middle" fill="#FF6A00" font-family="system-ui" font-size="18" font-weight="800">4.5</text>
</svg>
