  <line x1="280" y1="50" x2="290" y2="70" stroke="#FF6A00" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="500" y1="40" x2="510" y2="65" stroke="#FFB347" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="220" y1="150" x2="228" y2="170" stroke="#FF8C33" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
