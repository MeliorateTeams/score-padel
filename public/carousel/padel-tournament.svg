    <polygon points="250,80 253,88 261,88 255,93 257,101 250,96 243,101 245,93 239,88 247,88" opacity="0.4"/>
    <polygon points="550,60 552,66 558,66 553.5,70 555.5,76 550,72.5 544.5,76 546.5,70 542,66 548,66" opacity="0.5"/>
    <polygon points="180,200 182,206 188,206 183.5,210 185.5,216 180,212.5 174.5,216 176.5,210 172,206 178,206" opacity="0.3"/>
    <polygon points="620,180 622,186 628,186 623.5,190 625.5,196 620,192.5 614.5,196 616.5,190 612,186 618,186" opacity="0.35"/>
    <polygon points="300,300 302,306 308,306 303.5,310 305.5,316 300,312.5 294.5,316 296.5,310 292,306 298,306" opacity="0.25"/>
    <polygon points="520,280 522,286 528,286 523.5,290 525.5,296 520,292.5 514.5,296 516.5,290 512,286 518,286" opacity="0.3"/>
