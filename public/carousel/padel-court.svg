<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0F0F1A"/>
    </linearGradient>
    <linearGradient id="court1" x1="200" y1="120" x2="600" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6A00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF6A00" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="glow1" x1="400" y1="100" x2="400" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6A00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6A00" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg1)"/>
  <!-- Ambient glow -->
  <ellipse cx="400" cy="200" rx="350" ry="180" fill="url(#glow1)"/>
  <!-- Court floor -->
  <rect x="150" y="110" width="500" height="250" rx="8" fill="url(#court1)" stroke="#FF6A00" stroke-opacity="0.2" stroke-width="2"/>
  <!-- Court lines -->
  <line x1="400" y1="110" x2="400" y2="360" stroke="#FF6A00" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="150" y1="235" x2="650" y2="235" stroke="#FF6A00" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- Service boxes -->
  <rect x="250" y="150" width="150" height="80" rx="2" fill="none" stroke="#FF6A00" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="400" y="150" width="150" height="80" rx="2" fill="none" stroke="#FF6A00" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="250" y="240" width="150" height="80" rx="2" fill="none" stroke="#FF6A00" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="400" y="240" width="150" height="80" rx="2" fill="none" stroke="#FF6A00" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Net -->
  <line x1="150" y1="235" x2="650" y2="235" stroke="white" stroke-opacity="0.5" stroke-width="2.5" stroke-dasharray="6 3"/>
  <!-- Player 1 (left) -->
  <circle cx="280" cy="180" r="14" fill="#FF6A00"/>
  <circle cx="280" cy="168" r="7" fill="#FFB347"/>
  <line x1="280" y1="182" x2="280" y2="205" stroke="#FF6A00" stroke-width="3" stroke-linecap="round"/>
  <line x1="280" y1="190" x2="268" y2="178" stroke="#FF6A00" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="280" y1="190" x2="298" y2="182" stroke="#FF6A00" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Racket P1 -->
  <ellipse cx="302" cy="176" rx="10" ry="14" fill="none" stroke="#FFB347" stroke-width="2"/>
  <line x1="298" y1="182" x2="300" y2="178" stroke="#FFB347" stroke-width="2" stroke-linecap="round"/>
  <!-- Player 2 (right) -->
  <circle cx="520" cy="290" r="14" fill="#E55C00"/>
  <circle cx="520" cy="278" r="7" fill="#FF8C33"/>
  <line x1="520" y1="292" x2="520" y2="315" stroke="#E55C00" stroke-width="3" stroke-linecap="round"/>
  <line x1="520" y1="300" x2="508" y2="288" stroke="#E55C00" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="520" y1="300" x2="538" y2="292" stroke="#E55C00" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Racket P2 -->
  <ellipse cx="542" cy="286" rx="10" ry="14" fill="none" stroke="#FF8C33" stroke-width="2"/>
  <!-- Ball -->
  <circle cx="380" cy="200" r="6" fill="#FFB347"/>
  <circle cx="380" cy="200" r="10" fill="#FFB347" opacity="0.2"/>
  <circle cx="380" cy="200" r="16" fill="#FFB347" opacity="0.08"/>
  <!-- Ball trail -->
  <path d="M302 176 Q340 150 380 200" stroke="#FFB347" stroke-width="1.5" stroke-dasharray="4 4" fill="none" opacity="0.5"/>
  <!-- Score overlay -->
  <rect x="30" y="30" width="120" height="50" rx="12" fill="white" fill-opacity="0.1"/>
  <text x="90" y="50" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="600" opacity="0.7">SCORE PADEL</text>
  <text x="90" y="68" text-anchor="middle" fill="#FF6A00" font-family="system-ui" font-size="16" font-weight="800">6 - 4</text>
  <!-- Title text -->
  <text x="400" y="385" text-anchor="middle" fill="white" font-family="system-ui" font-size="13" opacity="0.4">Pista de pádel · Partido en vivo</text>
</svg>
